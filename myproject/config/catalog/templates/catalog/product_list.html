{% extends "catalog/base.html" %}

 {% load my_tags %}
 {% block content %}

 <div class="album py-5 bg-body-tertiary">
   <div class="container">
   <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
       {% include 'catalog/header.html' %}
       {% for product in object_list %}
     <div class="col-6">
       <div class="card shadow-sm">

         <img src="{{ product.image | filter_media }}">

         <div class="card-body">
           <p class="card-text">{{ object.name }}</p>
           <p>{{ object.description|truncatechars:100 }}</p>
           <div class="d-flex justify-content-between align-items-center">
             <div class="btn-group">
               <a class="btn btn-primary" href="{% url 'catalog:product_detail' product.pk %}" role="button">Посмотреть</a>
               <a class="btn btn-primary" href="{% url 'catalog:update_product' product.pk %}" role="button">Редактировать</a>
               <a class="btn btn-primary" href="{% url 'catalog:delete_product' product.pk %}" role="button">Удалить</a>
             </div>
           </div>
         </div>
       </div>
     </div>
     {% endfor %}
   </div>
   </div>
 </div>
<div class="btn-group">
               <a class="btn btn-primary" href="{% url 'catalog:add_product' %}" role="button">Добавить продукт</a>
               </div>
 {% endblock %}
